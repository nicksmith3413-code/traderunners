<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>TradeRunners</title>



<link rel="apple-touch-icon" href="icon.png">

<link rel="icon" href="icon.png">



<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-title" content="TradeRunners">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">



<style>

body {

    margin: 0;

    font-family: Arial, sans-serif;

    background: #f4f6f9;

}



/* SPLASH SCREEN */

#splash {

    position: fixed;

    width: 100%;

    height: 100%;

    background: linear-gradient(135deg,#1e3c72,#2a5298);

    color: white;

    display: flex;

    align-items: center;

    justify-content: center;

    flex-direction: column;

    z-index: 9999;

}



#splash h1 {

    font-size: 28px;

    margin-top: 10px;

}



/* MAIN APP */

#app {

    display: none;

}



.header {

    background: linear-gradient(135deg,#1e3c72,#2a5298);

    color: white;

    padding: 20px;

    border-bottom-left-radius: 20px;

    border-bottom-right-radius: 20px;

}



.container {

    padding: 20px;

}



.card {

    background: white;

    padding: 15px;

    border-radius: 15px;

    margin-bottom: 15px;

    box-shadow: 0 5px 15px rgba(0,0,0,0.1);

}



button {

    width: 100%;

    padding: 15px;

    border-radius: 10px;

    border: none;

    background: #2a5298;

    color: white;

    font-weight: bold;

    margin-top: 10px;

}



input, select {

    width: 100%;

    padding: 10px;

    margin-top: 10px;

    border-radius: 8px;

    border: 1px solid #ccc;

}



.role-btn {

    background: #eaeaea;

    color: #333;

}



.active {

    background: #2a5298;

    color: white;

}

</style>

</head>



<body>



<!-- SPLASH -->

<div id="splash">

    <img src="icon.png" width="80">

    <h1>TradeRunners</h1>

    <p>Loading...</p>

</div>



<!-- APP -->

<div id="app">



<div class="header">

    <h2>🚐 TradeRunners</h2>

    <p>Saving you time and money on every delivery</p>

</div>



<div class="container">



<div class="card">

<h3>Select Role</h3>

<button class="role-btn active" onclick="setRole('customer')">Customer</button>

<button class="role-btn" onclick="setRole('driver')">Driver</button>

</div>



<div id="customerSection" class="card">

<h3>Book Delivery</h3>



<input id="pickup" placeholder="Pickup postcode">

<input id="dropoff" placeholder="Dropoff postcode">



<select id="size">

<option>Small Items</option>

<option>Medium Items</option>

<option>Large Items</option>

</select>



<button onclick="getQuote()">Get Quote</button>



<h2 id="price"></h2>



<button onclick="bookJob()">Book Job</button>

</div>



<div id="driverSection" class="card" style="display:none;">

<h3>Driver Dashboard</h3>



<select>

<option>Car</option>

<option>Van</option>

<option>Trailer</option>

</select>



<button onclick="loadJobs()">Load Jobs</button>



<div id="jobs"></div>

</div>



</div>

</div>



<script>



// Splash screen

setTimeout(() => {

    document.getElementById("splash").style.display = "none";

    document.getElementById("app").style.display = "block";

}, 2000);



// Role switch

function setRole(role) {

    document.querySelectorAll(".role-btn").forEach(btn => btn.classList.remove("active"));



    if(role === "customer"){

        document.getElementById("customerSection").style.display = "block";

        document.getElementById("driverSection").style.display = "none";

        document.querySelectorAll(".role-btn")[0].classList.add("active");

    } else {

        document.getElementById("customerSection").style.display = "none";

        document.getElementById("driverSection").style.display = "block";

        document.querySelectorAll(".role-btn")[1].classList.add("active");

    }

}



// Pricing

function getQuote(){

    let price = Math.floor(Math.random() * 30) + 10;

    document.getElementById("price").innerText = "£" + price;

}



// Book job

function bookJob(){

    alert("Job booked! Driver will be assigned.");

}



// Driver jobs

function loadJobs(){

    document.getElementById("jobs").innerHTML = `

    <div class="card">

    LS15 → WF3<br>

    £26<br>

    <button>Accept Job</button>

    </div>

    `;

}



</script>



</body>

</html>
